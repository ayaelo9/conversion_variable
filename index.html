<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Calculadora de Gastos de Casa</title>
</head>
<body class="bg-slate-100 p-4 md:p-10 font-sans">

  <div class="max-w-3xl mx-auto space-y-4">
    
    <details class="bg-[#005a8f] text-white rounded shadow" open>
      <summary class="p-3 font-bold cursor-pointer outline-none">ENUNCIADO</summary>
    </details>

    <details class="border-2 border-[#005a8f] bg-white rounded shadow">
      <summary class="p-3 font-bold text-[#005a8f] cursor-pointer outline-none">Tipos de Datos en JavaScript</summary>
    </details>

    <div class="bg-[#f1f3f6] p-8 rounded-3xl shadow-lg border border-slate-200">
      <h1 class="text-[#005a8f] font-black text-2xl mb-2 uppercase italic">GASTOS DE LA CASA</h1>
      
      <div class="space-y-4 mb-6">
        <div class="flex items-center">
          <label class="w-1/3 text-right pr-6 font-semibold text-slate-600" for="nombre">Tu nombre:</label>
          <input class="w-2/3 border border-slate-300 rounded-lg px-4 py-2 text-[#0086c8] focus:border-[#0086c8] outline-none placeholder:text-slate-300" type="text" id="nombre" placeholder="Escribe tu nombre">
        </div>
        <div class="flex items-center">
          <label class="w-1/3 text-right pr-6 font-semibold text-slate-600" for="apellidos">Apellido(s):</label>
          <input class="w-2/3 border border-slate-300 rounded-lg px-4 py-2 text-[#0086c8] focus:border-[#0086c8] outline-none placeholder:text-slate-300" type="text" id="apellidos" placeholder="Tus apellidos">
        </div>
      </div>

      <fieldset class="border-2 border-[#005a8f] p-6 pt-8 my-8 rounded-3xl bg-white relative">
        <legend class="bg-[#005a8f] text-white px-4 py-1 rounded-full text-xs font-bold uppercase absolute -top-3.5 left-6">
          GASTOS FIJOS
        </legend>
        
        <div class="space-y-3">
          <div class="flex items-center">
            <label class="w-1/3 text-right pr-6 text-sm" for="internet">Internet:</label>
            <input class="w-2/3 border border-slate-300 rounded-lg px-4 py-1.5 text-[#0086c8] font-mono" type="number" id="internet" value="25">
          </div>
          <div class="flex items-center">
            <label class="w-1/3 text-right pr-6 text-sm" for="luz">Luz:</label>
            <input class="w-2/3 border border-slate-300 rounded-lg px-4 py-1.5 text-[#0086c8] font-mono" type="number" id="luz" value="0">
          </div>
          <div class="flex items-center">
            <label class="w-1/3 text-right pr-6 text-sm" for="agua">Agua:</label>
            <input class="w-2/3 border border-slate-300 rounded-lg px-4 py-1.5 text-[#0086c8] font-mono" type="number" id="agua" value="0">
          </div>
          <div class="flex items-center">
            <label class="w-1/3 text-right pr-6 text-sm" for="gas">Gas:</label>
            <input class="w-2/3 border border-slate-300 rounded-lg px-4 py-1.5 text-[#0086c8] font-mono" type="number" id="gas" value="0">
          </div>
          <div class="flex items-center">
            <label class="w-1/3 text-right pr-6 text-sm" for="alquiler">Alquiler:</label>
            <input class="w-2/3 border border-slate-300 rounded-lg px-4 py-1.5 text-[#0086c8] font-mono" type="number" id="alquiler" value="0">
          </div>
        </div>
      </fieldset>

      <button 
        type="button" 
        onclick="Calcular()" 
        class="bg-white border-2 border-[#005a8f] text-[#005a8f] px-10 py-2 rounded-xl font-bold hover:bg-[#005a8f] hover:text-white transition-colors duration-200 shadow-sm"
      >
        Calcular Gastos
      </button>

      <div id="totalGastos" class="mt-8 border-2 border-[#005a8f] p-5 bg-white rounded-2xl min-h-[60px] flex items-center italic text-slate-700 font-serif shadow-inner">
        El resultado aparecerá aquí...
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
